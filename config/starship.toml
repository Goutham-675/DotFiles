# ~/.config/starship.toml

format = """
$directory$git_branch$git_status$cmd_duration
$character"""

[character]
success_symbol = "[🐧](bold white)"
error_symbol = "[🐧](bold red)"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true
read_only = " 🔒"

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
modified = "!!"
untracked = "?"
staged = "+"
deleted = "✘"
style = "bold red"

[cmd_duration]
min_time = 2000
format = "[ $duration](bold yellow) "

[python]
symbol = " "
style = "bold yellow"

[nodejs]
symbol = " "
style = "bold green"

[rust]
symbol = " "
style = "bold orange"
