# ~/.config/hypr/hyprlock.conf

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    immediate_render = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 1
    blur_size = 5
    brightness = 0.4
    contrast = 0.9
    vibrancy = 0.15
}

# big time
label {
    monitor =
    text = cmd[update:1000] date "+%H:%M"
    color = rgba(235, 235, 235, 0.95)
    font_size = 96
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 140
    halign = center
    valign = center
}

# date below it, understated
label {
    monitor =
    text = cmd[update:60000] date "+%a, %d %b"
    color = rgba(200, 200, 200, 0.45)
    font_size = 15
    font_family = JetBrainsMono Nerd Font
    position = 0, 55
    halign = center
    valign = center
}

# input field
input-field {
    monitor =
    size = 220, 40
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.25
    outer_color = rgba(255, 255, 255, 0.08)
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = rgba(220, 220, 220, 0.9)
    fade_on_empty = true
    placeholder_text = <span foreground="##888888">...</span>
    check_color = rgba(140, 200, 140, 0.7)
    fail_color = rgba(200, 100, 100, 0.7)
    fail_text = <span foreground="##cc6666">wrong</span>
    rounding = 4
    position = 0, -30
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:30000] acpi -b | grep -o '[0-9]*%' | head -1
    color = rgba(200, 200, 200, 0.5)
    font_size = 13
    font_family = SF Pro Text
    position = 20, -20
    halign = left
    valign = top
}
