############################
# MONITOR
############################
monitor=,preferred,auto,1

############################
# AUTOSTART
############################
exec-once = waybar -c ~/.config/waybar/config -s ~/.config/waybar/style.css
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = nm-applet
exec-once = blueman-applet
exec-once = hypridle
exec-once = mako
exec-once = swww-daemon
#exec-once = bash -c "sleep 1 && swww img \"$(find /home/goutham/Pictures/wallpapers -type f | shuf -n 1)\" --transition-type grow"
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = libinput-gestures-setup start

############################
# ENV
############################
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
env = XCURSOR_THEME,phinger-cursors-light
env = XCURSOR_SIZE,24

############################
# INPUT
############################
input {
    kb_layout = us
    follow_mouse = 1

    touchpad {
        natural_scroll = no

    }
}



############################
# GENERAL
############################
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(88c0d0ff)
    col.inactive_border = rgba(444444aa)
    layout = dwindle

    # Use absolute path to dummy shader
    #screen_shader = "/home/goutham/.config/hypr/shaders/empty.glsl"
}

############################
# DECORATION
############################
decoration {
    rounding = 0
    blur {
        enabled = yes
        size = 5
        passes = 2
    }
   # screen_shader = ""
}

############################
# ANIMATIONS
############################
animations {
    enabled = yes
}

############################
# KEYBINDINGS
############################
$mod = SUPER

bind = $mod, Return, exec, ghostty
bind = $mod, Q, killactive
bind = $mod, M, exit
bind = $mod, E, exec, thunar
bind = $mod, F, fullscreen
bind = SUPER, D, exec, wofi --show drun
bind = $mod, L, exec, hyprlock
bind = $mod, X, exec, wlogout
bind = $mod, W, exec, ~/.local/bin/setwall
bind = CTRL SHIFT, H, exec, wlsunset -t 3500 -T 3501
bind = $mod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mod SHIFT, W, exec, waypaper
bind = $mod, B, exec, pkill waybar || waybar &
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
bind = $mod, Tab, workspace, previous
bind = $mod SHIFT, A, movefocus, l
bind = $mod SHIFT, D, movefocus, r
bind = $mod SHSIFT, W, movefocus, u
bind = $mod SHIFT, S, movefocus, d
bind = $mod SHIFT, C, exec, cliphist wipe
bind = $mod SHIFT, E, exec, wofi-emoji
bind = $mod SHIFT, R, exec, ~/.local/bin/screenrecord

############################
# WORKSPACES
############################
# Switch to workspace
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move active window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9


############################
# WINDOW MANAGEMENT
############################
bind = $mod, Tab, cyclenext
bind = $mod SHIFT, Tab, cyclenext, prev
bind = $mod, T, togglefloating
bind = $mod, F, fullscreen

############################
# BRIGHTNESS
############################
bind = , XF86MonBrightnessUp, exec, brightnessctl set +2%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 2%-

############################
# VOLUME
############################
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

############################
# SCREENSHOTS
############################
# Select area → copy to clipboard
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
# Full screen → copy to clipboard
bind = $mod, Print, exec, grim - | wl-copy
# Select area → save to Pictures
bind = $mod SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +'%Y-%m-%d_%H-%M-%S').png
